<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>3-Day Recomp Log</title>
    <style>
      :root {
        --bg: #14171c;
        --card: #1c2128;
        --card2: #222933;
        --line: #2a313b;
        --text: #e8ecf1;
        --sub: #9aa6b6;
        --faint: #6e7a8b;
        --red: #e0454a;
        --blue: #4585dc;
        --yellow: #e8b33a;
        --green: #46b97c;
        --chipbg: #1e3a2c;
        --chiptx: #67d69b;
        --accent: var(--red);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }
      body {
        padding-bottom: 120px;
        min-height: 100vh;
      }
      .num {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-variant-numeric: tabular-nums;
      }
      .disp {
        font-family:
          ui-rounded,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-weight: 800;
      }

      header {
        padding: 18px 16px 10px;
      }
      header h1 {
        font-size: 21px;
        letter-spacing: -0.02em;
      }
      header h1 .plate {
        display: inline-block;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--accent);
        margin-right: 7px;
        vertical-align: 1px;
        transition: background 0.25s;
      }
      .hrow {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }
      .date {
        color: var(--sub);
        font-size: 13px;
      }
      .unit-tog {
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--sub);
        border-radius: 8px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .unit-tog b {
        color: var(--text);
      }

      nav {
        display: flex;
        gap: 6px;
        padding: 8px 16px 14px;
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 5;
      }
      nav button {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--sub);
        border-radius: 12px;
        padding: 11px 0 9px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      nav button .dot {
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin: 0 auto 4px;
        background: var(--faint);
      }
      nav button.on {
        color: var(--text);
        border-color: var(--tabc, var(--accent));
      }
      nav button.on .dot {
        background: var(--tabc, var(--accent));
      }

      .wrap {
        padding: 0 16px;
      }
      .day-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin: 2px 2px 12px;
      }
      .day-head h2 {
        font-size: 17px;
      }
      .day-head .est {
        color: var(--sub);
        font-size: 12px;
      }

      details.primer {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 12px;
      }
      details.primer summary {
        padding: 13px 14px;
        font-size: 14px;
        font-weight: 700;
        color: var(--sub);
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      details.primer summary::after {
        content: "+";
        font-size: 18px;
        color: var(--faint);
      }
      details.primer[open] summary::after {
        content: "–";
      }
      details.primer ul {
        padding: 0 14px 13px;
        list-style: none;
      }
      details.primer li {
        font-size: 13.5px;
        color: var(--sub);
        padding: 5px 0;
        border-top: 1px solid var(--line);
      }
      details.primer li b {
        color: var(--text);
        font-weight: 600;
      }
      details.primer li a {
        color: var(--chiptx);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .ex {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .ex.opt {
        border-style: dashed;
      }
      .ex-top {
        padding: 13px 14px 9px;
      }
      .ex-name {
        font-size: 15.5px;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1.25;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .chip {
        font-size: 13px;
        font-weight: 800;
        border-radius: 7px;
        padding: 4px 9px;
        letter-spacing: 0.01em;
        background: var(--chipbg);
        color: var(--chiptx);
      }
      .chip.rx {
        font-size: 13.5px;
      }
      .chip.optional {
        background: transparent;
        border: 1px dashed var(--chiptx);
        font-weight: 700;
      }
      .demos {
        margin-top: 7px;
        font-size: 12px;
        color: var(--faint);
      }
      .demos a {
        color: var(--sub);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .demos .gap {
        color: var(--faint);
        font-style: italic;
      }
      .marker {
        font-size: 15.5px;
        font-weight: 800;
        color: var(--text);
        margin-right: 8px;
        flex: none;
        letter-spacing: -0.01em;
        line-height: 1.25;
      }
      .ex-name-row {
        display: flex;
        align-items: flex-start;
      }
      .legend {
        font-size: 11.5px;
        color: var(--faint);
        margin: -4px 2px 12px;
        line-height: 1.4;
      }
      .meta-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 2px 10px;
      }
      .datein {
        background: var(--card2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 9px;
        padding: 7px 9px;
        font-size: 13.5px;
        font-weight: 700;
        color-scheme: dark;
        min-height: 38px;
      }
      #saveflag {
        font-size: 12px;
        color: var(--green);
        opacity: 0;
        transition: opacity 0.4s;
      }
      #saveflag.warn {
        color: var(--red);
        opacity: 1;
      }
      .lasttime {
        margin-top: 7px;
        font-size: 12.5px;
        color: var(--sub);
      }
      .lasttime .num {
        color: var(--text);
      }
      .note {
        margin-top: 7px;
        font-size: 13px;
        color: var(--sub);
        line-height: 1.45;
      }
      .exnote {
        width: 100%;
        margin-top: 9px;
        background: var(--card2);
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--text);
        font-size: 13.5px;
        padding: 9px 10px;
        min-height: 40px;
      }
      .exnote:focus {
        outline: none;
        border-color: var(--accent);
      }
      .exnote::placeholder {
        color: var(--faint);
      }
      .exnote-h {
        margin-top: 4px;
        font-size: 12.5px;
        color: var(--sub);
        font-style: italic;
      }
      .hist-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
      }
      .hbtn {
        flex: 1;
        background: var(--card2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 11px 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        min-height: 42px;
      }
      .hbtn.del {
        color: var(--red);
        border-color: #3a2326;
      }
      .hbtn.save {
        background: var(--green);
        border-color: var(--green);
        color: #0c1f15;
      }
      .edit-note {
        font-size: 12px;
        color: var(--sub);
        background: var(--card2);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      .edit-ex {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .edit-exname {
        font-size: 13.5px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      table.sets {
        width: 100%;
        border-collapse: collapse;
        margin-top: 4px;
      }
      table.sets th {
        font-size: 11px;
        color: var(--sub);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        text-align: left;
        padding: 4px 6px 6px;
      }
      table.sets th:first-child {
        padding-left: 14px;
        width: 52px;
        text-align: center;
      }
      table.sets th.cdone {
        width: 56px;
        text-align: center;
      }
      table.sets td {
        border-top: 1px solid var(--line);
        padding: 7px 6px;
      }
      table.sets td:first-child {
        padding-left: 14px;
        color: var(--sub);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
      .setin {
        width: 100%;
        background: var(--card2);
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--text);
        font-size: 16px;
        padding: 10px 8px;
        text-align: center;
        min-height: 44px;
      }
      .setin:focus {
        outline: none;
        border-color: var(--accent);
      }
      .setin::placeholder {
        color: var(--faint);
      }
      td.cdone {
        text-align: center;
      }
      .donebtn {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        border: 1px solid var(--line);
        background: var(--card2);
        color: var(--faint);
        font-size: 18px;
        cursor: pointer;
      }
      .donebtn.on {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .finish {
        width: 100%;
        margin: 6px 0 4px;
        background: var(--accent);
        border: none;
        border-radius: 14px;
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        padding: 16px;
        cursor: pointer;
        transition: background 0.25s;
      }
      .finish:disabled {
        background: var(--card2);
        color: var(--faint);
      }
      .subact {
        width: 100%;
        margin: 10px 0 0;
        background: transparent;
        border: none;
        color: var(--faint);
        font-size: 13px;
        padding: 8px;
        cursor: pointer;
        text-decoration: underline;
      }

      /* rest timer */
      #timerbar {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: var(--card2);
        border: 1px solid var(--accent);
        border-radius: 16px;
        padding: 12px 14px;
        display: none;
        align-items: center;
        gap: 12px;
        z-index: 20;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      }
      #timerbar.show {
        display: flex;
      }
      #timerbar.zero {
        border-color: var(--green);
      }
      #t-num {
        font-size: 26px;
        font-weight: 800;
        min-width: 74px;
      }
      #t-lbl {
        flex: 1;
        font-size: 12.5px;
        color: var(--sub);
        line-height: 1.3;
      }
      #timerbar button {
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      /* history */
      .hist-empty {
        color: var(--faint);
        text-align: center;
        padding: 50px 20px;
        font-size: 14px;
        line-height: 1.5;
      }
      .sess {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 12px;
      }
      .sess summary {
        padding: 13px 14px;
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sess summary .l .d1 {
        font-size: 14.5px;
        font-weight: 700;
      }
      .sess summary .l .d2 {
        font-size: 12px;
        color: var(--sub);
        margin-top: 2px;
      }
      .sess summary .sdot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      .sess .body {
        padding: 0 14px 12px;
      }
      .sess .exline {
        padding: 8px 0;
        border-top: 1px solid var(--line);
        font-size: 13px;
      }
      .sess .exline .n {
        color: var(--sub);
      }
      .sess .exline .v {
        margin-top: 2px;
      }
      .storage-note {
        color: var(--faint);
        font-size: 11.5px;
        text-align: center;
        padding: 14px 24px;
        line-height: 1.5;
      }
      .subhead {
        margin-top: 7px;
      }
      .storebadge {
        display: inline-block;
        font-size: 11.5px;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 6px;
        letter-spacing: 0.01em;
      }
      .storebadge.ok {
        background: #16271d;
        color: #5fcb8e;
      }
      .storebadge.bad {
        background: #3a1e20;
        color: #f0888c;
      }
      .iorow {
        display: flex;
        gap: 8px;
        margin: 14px 0 2px;
      }
      .iobtn {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 12px;
        padding: 13px 8px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        min-height: 44px;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 24px;
      }
      .modal-ov.show {
        display: flex;
      }
      .modal {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        max-width: 340px;
        width: 100%;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
      }
      .modal-msg {
        font-size: 14.5px;
        color: var(--text);
        line-height: 1.5;
        margin-bottom: 18px;
      }
      .modal-btns {
        display: flex;
        gap: 10px;
      }
      .modal-btn {
        flex: 1;
        border-radius: 11px;
        padding: 13px 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        min-height: 46px;
        background: var(--card2);
        border: 1px solid var(--line);
        color: var(--text);
      }
      .modal-btn.danger {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }
      .modal-btn.solo {
        flex: none;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="hrow">
        <h1 class="disp">
          <span class="plate" id="plate"></span>3-Day Recomp Log
        </h1>
        <button class="unit-tog" id="unitTog"></button>
      </div>
      <div class="subhead">
        <span class="storebadge" id="storebadge"></span>
      </div>
    </header>

    <nav id="nav"></nav>
    <div class="wrap" id="view"></div>

    <div id="timerbar">
      <div class="num" id="t-num">0:00</div>
      <div id="t-lbl">Rest</div>
      <button id="t-add">+30s</button>
      <button id="t-x">Done</button>
    </div>

    <div id="modalOv" class="modal-ov">
      <div class="modal">
        <div id="modalMsg" class="modal-msg"></div>
        <div class="modal-btns">
          <button id="modalNo" class="modal-btn">Cancel</button>
          <button id="modalYes" class="modal-btn danger">OK</button>
        </div>
      </div>
    </div>

    <script>
      /* ================= PROGRAM (v4 — verified demo links + UI revision) =================
   marker = pairing id (A1/A2…) for supersets, or a sequence number for standalone lifts.
   "⇄" = alternate the two exercises in that block. Demo links → smartworkout.app library. */
      const LIB = "https://smartworkout.app/en/exercise-library/";
      const PXB = "https://smartworkout.app/en/exercise-library/";
      const PRIMER = [
        {
          lt: "Cat-cow",
          u: PXB + "abs/cat-cow",
          rest: " + thoracic extensions",
          d: "8 + 10 reps",
        },
        { lt: "Wall chin tucks", rest: "", d: "10 × 3-sec hold" },
        {
          lt: "Half-kneeling hip-flexor stretch",
          u: PXB + "legs/half-kneeling-quad-stretch",
          rest: "",
          d: '30 sec per side — kneel on the side being stretched, squeeze that glute and tuck your hips under, then lean forward (prop the back foot on a bench/wall for the "couch stretch")',
        },
        {
          lt: "Dead bug",
          u: PXB + "abs/dead-bug",
          rest: "",
          d: "8 per side, low back flat",
        },
        { lt: "Band pull-aparts", rest: "", d: "15" },
      ];
      const PROGRAM = [
        {
          id: "A",
          tab: "Day 1",
          name: "Full Body A · Squat Focus",
          color: "var(--red)",
          hex: "#E0454A",
          est: "≈ 58-68 min",
          primer: PRIMER,
          ex: [
            {
              id: "A_squat",
              name: "Goblet / Back Squat",
              sets: 3,
              reps: "6-10",
              rest: 160,
              pair: null,
              scheme: "straight sets · 2½-3 min rest",
              links: [
                {
                  t: "goblet squat",
                  u: "https://smartworkout.app/en/exercise-library/legs/dumbbell-goblet-squat",
                },
                {
                  t: "back squat",
                  u: "https://smartworkout.app/en/exercise-library/legs/barbell-squat",
                },
              ],
              note: "1-2 ramp-up sets first. Brace ribs down, don't arch the lower back; knees track over the toes — don't let them cave in.",
            },
            {
              id: "A_rdl",
              name: "Romanian Deadlift",
              sets: 3,
              reps: "8-10",
              rest: 140,
              pair: null,
              scheme: "straight sets · 2-2½ min rest",
              links: [
                {
                  t: "RDL",
                  u: "https://smartworkout.app/en/exercise-library/legs/dumbbell-romanian-deadlift",
                },
              ],
              note: "Push hips back, soft knees, flat back — stop where your hamstrings stop, not your spine. Glutes + hams pull the pelvis out of anterior tilt.",
            },
            {
              id: "A_row",
              name: "Chest-Supported DB / Plate-Iso Row",
              sets: 3,
              reps: "8-12",
              rest: 90,
              pair: "A1",
              scheme: "A1 ⇄ A2 · 90s rest",
              links: [
                {
                  t: "chest-supported DB row",
                  u: "https://smartworkout.app/en/exercise-library/back/incline-bench-dumbbell-wide-row",
                },  
                {
                  t: "plate-loaded iso-lateral row",
                  u: "https://smartworkout.app/en/exercise-library/back/chest-supported-machine-row",
                },
                
              ],
              note: "Chest glued to the pad. Squeeze shoulder blades back and down — no shrugging.",
            },
            {
              id: "A_press",
              name: "Incline DB Press",
              sets: 3,
              reps: "8-12",
              rest: 90,
              pair: "A2",
              scheme: "A1 ⇄ A2 · 90s rest",
              links: [
                {
                  t: "incline DB press",
                  u: "https://smartworkout.app/en/exercise-library/chest/incline-dumbbell-bench-press",
                },
              ],
              note: "Feet planted, slight natural arch against the bench. Lower to the upper chest.",
            },
            {
              id: "A_land",
              perSide: true,
              name: "½-Kneeling 1-Arm Press (L first)",
              sets: 2,
              reps: "8-10 /side",
              rest: 75,
              pair: "B1",
              scheme: "B1 ⇄ B2 · 75s rest",
              links: [
                {
                  t: "landmine press",
                  u: "https://smartworkout.app/en/exercise-library/shoulders/one-arm-landmine-half-kneeling-shoulder-press",
                },
                {
                  t: "DB version",
                  u: "https://smartworkout.app/en/exercise-library/shoulders/half-kneeling-shoulder-dumbbell-press",
                },
              ],
              note: "Left side first, sets the rep count. Squeeze the glute of the down-leg, ribs down — press without leaning back.",
            },
            {
              id: "A_rear",
              name: "Chest-Supported Rear-Delt Raise",
              sets: 2,
              reps: "12-15",
              rest: 75,
              pair: "B2",
              scheme: "B1 ⇄ B2 · 75s rest",
              links: [
                {
                  t: "rear-delt raise",
                  u: "https://smartworkout.app/en/exercise-library/back/dumbbell-incline-chest-supported-lateral-raises",
                },
              ],
              note: "Chest on an incline bench, lead with the pinkies, arc the DBs out and slightly back. No swing, no shrug.",
            },
            {
              id: "A_plank",
              timed: true,
              name: "RKC Plank / Hollow Hold",
              sets: 2,
              reps: "20-30 sec",
              rest: 60,
              pair: null,
              scheme: "finisher · 45-60s rest",
              links: [
                {
                  t: "RKC plank",
                  u: "https://smartworkout.app/en/exercise-library/abs/plank",
                },

      /* ================= STATE & STORAGE =================
   Three-tier storage adapter, picked automatically at launch:
   1. "claude" — window.storage (available when this artifact is viewed inside
      the Claude app/claude.ai; data is account-bound and survives sessions)
   2. "local"  — localStorage (works when this file is self-hosted and opened
      in Safari/Chrome; data is bound to the device + the URL it's served from)
   3. "memory" — nothing persists; a warning banner is shown.
   JSON export/import (History tab) works in every mode and is the backup path. */
      let history = [],
        active = {},
        prefs = { unit: "lb" },
        tab = null,
        saveT = null,
        editIdx = null;

      /* Custom modal dialogs — native confirm()/alert() are blocked inside sandboxed
   iframes (e.g. the Claude artifact viewer), so we roll our own that work everywhere. */
      function uiConfirm(msg, okText = "OK", danger = true) {
        return new Promise((resolve) => {
          const ov = document.getElementById("modalOv");
          const yes = document.getElementById("modalYes"),
            no = document.getElementById("modalNo");
          document.getElementById("modalMsg").textContent = msg;
          yes.textContent = okText;
          yes.className = "modal-btn" + (danger ? " danger" : "");
          no.style.display = "";
          ov.classList.add("show");
          const done = (v) => {
            ov.classList.remove("show");
            yes.onclick = null;
            no.onclick = null;
            ov.onclick = null;
            resolve(v);
          };
          yes.onclick = () => done(true);
          no.onclick = () => done(false);
          ov.onclick = (e) => {
            if (e.target === ov) done(false);
          };
        });
      }
      function uiAlert(msg, okText = "OK") {
        return new Promise((resolve) => {
          const ov = document.getElementById("modalOv");
          const yes = document.getElementById("modalYes"),
            no = document.getElementById("modalNo");
          document.getElementById("modalMsg").textContent = msg;
          yes.textContent = okText;
          yes.className = "modal-btn solo";
          no.style.display = "none";
          ov.classList.add("show");
          const done = () => {
            ov.classList.remove("show");
            yes.onclick = null;
            ov.onclick = null;
            no.style.display = "";
            resolve();
          };
          yes.onclick = done;
          ov.onclick = (e) => {
            if (e.target === ov) done();
          };
        });
      }
      let storageMode = "memory";
      const mem = {};
      let ephemeral = false;

      async function detectStorage() {
        if (window.storage && typeof window.storage.get === "function") {
          storageMode = "claude";
          return;
        }
        // Does localStorage physically accept a write?
        let canWrite = false;
        try {
          localStorage.setItem("wt-probe", "1");
          canWrite = localStorage.getItem("wt-probe") === "1";
          localStorage.removeItem("wt-probe");
        } catch (e) {
          canWrite = false;
        }
        if (!canWrite) {
          storageMode = "memory";
          return;
        }
        storageMode = "local";
        // Writes succeed in Safari Private mode too, but the data is throwaway. Private mode
        // exposes a tiny storage quota (~tens of MB) vs hundreds of MB / GB in normal mode.
        // Use that as a heuristic to warn the user their data may not survive the tab closing.
        try {
          if (navigator.storage && navigator.storage.estimate) {
            const { quota } = await navigator.storage.estimate();
            if (
              typeof quota === "number" &&
              quota > 0 &&
              quota < 200 * 1024 * 1024
            )
              ephemeral = true; // <200MB ⇒ likely private
          }
          // Stronger signal: persisted() returns false and can't be upgraded in private mode
          if (navigator.storage && navigator.storage.persisted) {
            const persisted = await navigator.storage.persisted();
            if (!persisted && navigator.storage.persist) {
              const granted = await navigator.storage
                .persist()
                .catch(() => false);
              if (!granted && ephemeral) ephemeral = true;
            }
          }
        } catch (e) {}
      }
      async function sget(key, fallback) {
        if (storageMode === "claude") {
          try {
            const r = await Promise.race([
              window.storage.get(key),
              new Promise((_, rej) =>
                setTimeout(() => rej(new Error("timeout")), 1200),
              ),
            ]);
            return r ? JSON.parse(r.value) : fallback;
          } catch (e) {
            return fallback;
          }
        }
        if (storageMode === "local") {
          try {
            const v = localStorage.getItem(key);
            return v !== null ? JSON.parse(v) : fallback;
          } catch (e) {
            return fallback;
          }
        }
        return key in mem ? mem[key] : fallback;
      }
      async function sset(key, val) {
        if (storageMode === "claude") {
          try {
            await window.storage.set(key, JSON.stringify(val));
          } catch (e) {}
          return;
        }
        if (storageMode === "local") {
          try {
            localStorage.setItem(key, JSON.stringify(val));
          } catch (e) {}
          return;
        }
        mem[key] = val;
      }
      function flashSaved() {
        const f = document.getElementById("saveflag");
        if (!f) return;
        if (storageMode === "memory") {
          f.textContent = "⚠ not saved — memory only";
          f.classList.add("warn");
          return;
        }
        if (ephemeral) {
          f.textContent = "⚠ saved to this tab only";
          f.classList.add("warn");
          return;
        }
        f.classList.remove("warn");
        f.textContent = "✓ saved";
        f.style.opacity = 1;
        clearTimeout(f._t);
        f._t = setTimeout(() => {
          f.style.opacity = 0;
        }, 1400);
      }
      function queueSave() {
        clearTimeout(saveT);
        saveT = setTimeout(async () => {
          await sset("wt-active", active);
          flashSaved();
        }, 500);
      }

      async function init() {
        await detectStorage();
        history = await sget("wt-history", []);
        active = await sget("wt-active", {});
        prefs = await sget("wt-prefs", { unit: "lb" });
        paintBadge();
        tab = Object.keys(active).length ? Object.keys(active)[0] : "A";
        render();

      function paintBadge() {
        const b = document.getElementById("storebadge");
        if (!b) return;
        if (storageMode === "memory" || ephemeral) {
          b.className = "storebadge bad";
          b.textContent = ephemeral
            ? "⚠ Private tab — won't save"
            : "⚠ Not saving";
        } else if (storageMode === "claude") {
          b.className = "storebadge ok";
          b.textContent = "● Saved · Claude session";
        } else {
          b.className = "storebadge ok";
          b.textContent = "● Saved on device";
        }
      }

      /* ================= HELPERS ================= */
      function rowsFor(e) {
        // returns array of empty set-entries for one exercise
        if (e.perSide) {
          const a = [];
          for (let n = 1; n <= e.sets; n++) {
            a.push({ set: n, side: "L", w: "", r: "", done: false });
            a.push({ set: n, side: "R", w: "", r: "", done: false });
          }
          return a;
        }
        return Array.from({ length: e.sets }, (_, n) => ({
          set: n + 1,
          w: "",
          r: "",
          done: false,
        }));
      }
      function blank(day) {
        const d = {};
        day.ex.forEach((e) => {
          d[e.id] = rowsFor(e);
        });
        return d;
      }
      function todayYMD() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }
      function partner(p) {
        return p[0] + (p[1] === "1" ? "2" : "1");
      }
      function getActive(day) {
        if (!active[day.id]) {
          active[day.id] = {
            started: new Date().toISOString(),
            dateYMD: todayYMD(),
            data: blank(day),
            notes: {},
          };
          // persist-forward: pre-fill notes from the most recent finished session of this day
          const prev = lastSession(day.id);
          if (prev && prev.notes)
            day.ex.forEach((e) => {
              if (prev.notes[e.id])
                active[day.id].notes[e.id] = prev.notes[e.id];
            });
        }
        if (!active[day.id].dateYMD) active[day.id].dateYMD = todayYMD();
        if (!active[day.id].notes) active[day.id].notes = {};
        // patch in any program changes (new exercises, per-side conversions)
        day.ex.forEach((e) => {
          if (!active[day.id].data[e.id])
            active[day.id].data[e.id] = rowsFor(e);
        });
        return active[day.id];
      }
      function lastSession(dayId) {
        for (let i = history.length - 1; i >= 0; i--)
          if (history[i].dayId === dayId) return history[i];
        return null;
      }
      function rowLabel(s) {
        return s.side ? `${s.set} ${s.side}` : String(s.set);
      }
      function fmtSets(arr) {
        const f = arr.filter((s) => s.w !== "" || s.r !== "");
        if (!f.length) return null;
        return f
          .map(
            (s) => `${s.side ? s.side + " " : ""}${s.w || "–"}×${s.r || "–"}`,
          )
          .join(", ");
      }
      function bestWeight(exId) {
        let m = null;
        history.forEach((h) => {
          (h.data[exId] || []).forEach((s) => {
            const w = parseFloat(s.w);
            if (!isNaN(w) && (m === null || w > m)) m = w;
          });
        });
        return m;
      }
      function esc(s) {
        return s.replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }

      function renderDay(v, day) {
        const sess = getActive(day),
          last = lastSession(day.id);
        let h = `<div class="day-head"><h2 class="disp">${day.name}</h2><span class="est num">${day.est}</span></div>`;
        h += `<div class="meta-row"><input type="date" class="datein" value="${sess.dateYMD}" onchange="setDate('${day.id}',this.value)"><span id="saveflag"></span></div>`;
        h += `<div class="legend">Marker = order: <b>1, 2…</b> standalone lifts, <b>A1/A2…</b> paired (alternate the two; the time shown is your rest).</div>`;
        h += `<details class="primer"><summary>5-min posture primer / warm-up</summary><ul>${day.primer
          .map((p) => {
            const head = p.u
              ? `<a href="${p.u}" target="_blank" rel="noopener">${p.lt}</a>`
              : p.lt;
            return `<li><b>${head}${p.rest || ""}</b> — ${p.d}</li>`;
          })
          .join("")}</ul></details>`;
        let seq = 0;
        day.ex.forEach((e) => {
          const lt = last ? fmtSets(last.data[e.id] || []) : null;
          const best = bestWeight(e.id);
          const marker = e.pair ? e.pair : String(++seq);
          const demos =
            e.links && e.links.length
              ? `Demo: ${e.links.map((l) => `<a href="${l.u}" target="_blank" rel="noopener">${l.t}</a>`).join(" · ")}`
              : `<span class="gap">No library demo — see note</span>`;
          h += `<div class="ex${e.optional ? " opt" : ""}">
      <div class="ex-top">
        <div class="ex-name-row"><span class="marker">${marker}</span><div class="ex-name">${e.name}</div></div>
        <div class="chips">
          <span class="chip rx num">${e.sets} × ${e.reps}</span>
          <span class="chip">${e.scheme}</span>
          ${e.optional ? `<span class="chip optional">optional</span>` : ""}
        </div>
        <div class="demos">${demos}</div>
        ${lt ? `<div class="lasttime">Last: <span class="num">${lt}</span>${best !== null ? ` · Best: <span class="num">${best} ${prefs.unit}</span>` : ""}</div>` : best !== null ? `<div class="lasttime">Best: <span class="num">${best} ${prefs.unit}</span></div>` : ""}
        <div class="note">${e.note}</div>
        <input class="exnote" type="text" placeholder="Notes (seat height, cable pin, cues…) — carries to next session" value="${esc(sess.notes && sess.notes[e.id] ? sess.notes[e.id] : "")}" oninput="updNote('${e.id}',this.value)">
      </div>
      <table class="sets">
        <tr><th>Set</th><th>${e.timed ? "Time (sec)" : "Reps"}</th><th>Weight (${prefs.unit})</th><th class="cdone">Done</th></tr>
        ${sess.data[e.id]
          .map(
            (s, i) => `
          <tr>
            <td class="num">${rowLabel(s)}</td>
            <td><input class="setin num" type="text" inputmode="numeric" placeholder="—" value="${esc(String(s.r))}" oninput="upd('${e.id}',${i},'r',this.value)"></td>
            <td><input class="setin num" type="text" inputmode="decimal" placeholder="—" value="${esc(String(s.w))}" oninput="upd('${e.id}',${i},'w',this.value)"></td>
            <td class="cdone"><button class="donebtn ${s.done ? "on" : ""}" onclick="toggleDone('${e.id}',${i})">✓</button></td>
          </tr>`,
          )
          .join("")}
      </table>
    </div>`;
        });
        const logged = Object.values(sess.data)
          .flat()
          .some((s) => s.w !== "" || s.r !== "" || s.done);
        h += `<button class="finish" ${logged ? "" : "disabled"} onclick="finish('${day.id}')">Finish workout</button>`;
        h += `<button class="subact" onclick="resetDay('${day.id}')">Clear this workout</button>`;
        if (storageMode === "memory")
          h += `<div class="storage-note">⚠️ No persistent storage detected — entries live in memory only and vanish when the page closes. Use Export in the History tab to save a backup before leaving.</div>`;
        else if (ephemeral)
          h += `<div class="storage-note">⚠️ Looks like a private/temporary tab — entries save only until this tab closes. Launch from your Home Screen shortcut for lasting storage, and export a JSON backup to be safe.</div>`;
        else if (storageMode === "claude")
          h += `<div class="storage-note">✅ Saving in the Claude session (survives between sessions while viewed here). Entries auto-save as you type; “Finish workout” files the session into History.</div>`;
        else
          h += `<div class="storage-note">✅ Saving on this device (your browser's local storage, tied to this URL). Entries auto-save as you type. Export a JSON backup now and then from the History tab.</div>`;
        v.innerHTML = h;
      }

      function renderHistory(v) {
        const io = `<div class="iorow">
      <button class="iobtn" onclick="exportData()">Export backup (JSON)</button>
      <button class="iobtn" onclick="document.getElementById('importFile').click()">Import backup</button>
    </div>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">`;
        if (!history.length) {
          v.innerHTML = `<div class="hist-empty">No sessions yet.<br>Finish your first workout and it'll show up here with every set you logged.<br><br>Moving from another device? Restore a backup below.</div>${io}`;
          return;
        }
        let h = "";
        // iterate newest-first but keep the real index for edit/delete
        history
          .map((s, idx) => ({ s, idx }))
          .reverse()
          .forEach(({ s, idx }) => {
            const day = PROGRAM.find((d) => d.id === s.dayId) || {
              name: s.dayId,
              hex: "#888",
            };
            const date = new Date(s.date).toLocaleDateString(undefined, {
              weekday: "short",
              month: "short",
              day: "numeric",
            });
            const nsets = Object.values(s.data)
              .flat()
              .filter((x) => x.w !== "" || x.r !== "").length;
            const open = idx === editIdx ? " open" : "";
            let body;
            if (idx === editIdx) {
              body = editBody(s, idx);
            } else {
              body = `${Object.entries(s.data)
                .map(([exId, sets]) => {
                  const f = fmtSets(sets);
                  const e = EXMAP[exId] || { name: exId };
                  const noteTxt = s.notes && s.notes[exId] ? s.notes[exId] : "";
                  if (!f && !noteTxt) return "";
                  return `<div class="exline"><div class="n">${e.name}</div>${f ? `<div class="v num">${f} <span style="color:var(--faint)">(${s.unit || "lb"})</span></div>` : ""}${noteTxt ? `<div class="exnote-h">📝 ${esc(noteTxt)}</div>` : ""}</div>`;
                })
                .join("")}
      <div class="hist-actions">
        <button class="hbtn" onclick="editStart(${idx})">Edit</button>
        <button class="hbtn del" onclick="delSession(${idx})">Delete</button>
      </div>`;
            }
            h += `<details class="sess"${open}><summary>
        <div class="l"><div class="d1">${day.name}</div><div class="d2">${date} · ${nsets} sets logged</div></div>
        <span class="sdot" style="background:${day.hex}"></span></summary>
      <div class="body">${body}</div></details>`;
          });
        h += io;
        h += `<button class="subact" onclick="wipe()">Delete all history</button>`;
        v.innerHTML = h;
      }

      function editBody(s, idx) {
        const day = PROGRAM.find((d) => d.id === s.dayId) || { name: s.dayId };
        const dateYMD = new Date(s.date).toISOString().slice(0, 10);
        let h = `<div class="edit-note">Editing this session. Changes here only affect this saved entry.</div>`;
        h += `<div class="meta-row"><input type="date" class="datein" value="${dateYMD}" onchange="editField(${idx},'date',this.value)"></div>`;
        Object.entries(s.data).forEach(([exId, sets]) => {
          const e = EXMAP[exId] || { name: exId, timed: false };
          const noteTxt = s.notes && s.notes[exId] ? s.notes[exId] : "";
          h += `<div class="edit-ex"><div class="edit-exname">${e.name}</div>
      <table class="sets"><tr><th>Set</th><th>${e.timed ? "Time (sec)" : "Reps"}</th><th>Weight</th></tr>
      ${sets
        .map(
          (st, i) => `<tr>
        <td class="num">${rowLabel(st)}</td>
        <td><input class="setin num" type="text" inputmode="numeric" value="${esc(String(st.r))}" oninput="editSet(${idx},'${exId}',${i},'r',this.value)"></td>
        <td><input class="setin num" type="text" inputmode="decimal" value="${esc(String(st.w))}" oninput="editSet(${idx},'${exId}',${i},'w',this.value)"></td>
      </tr>`,
        )
        .join("")}</table>
      <input class="exnote" type="text" placeholder="Notes…" value="${esc(noteTxt)}" oninput="editNote(${idx},'${exId}',this.value)"></div>`;
        });
        h += `<div class="hist-actions">
    <button class="hbtn save" onclick="editSave()">Done</button>
    <button class="hbtn" onclick="editCancel()">Cancel</button>
  </div>`;
        return h;
      }

      /* ================= BACKUP (works in every storage mode) ================= */
      window.exportData = () => {
        const payload = {
          app: "3-day-recomp-log",
          version: 1,
          exported: new Date().toISOString(),
          prefs,
          history,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `workout-log-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(a.href);
          a.remove();
        }, 2000);
      };
      window.importData = (input) => {
        const f = input.files && input.files[0];
        if (!f) return;
        const rd = new FileReader();
        rd.onload = async () => {
          try {
            const d = JSON.parse(rd.result);
            if (!d || !Array.isArray(d.history)) throw new Error("bad file");
            if (
              history.length &&
              !(await uiConfirm(
                `Replace the ${history.length} session(s) stored here with the ${d.history.length} session(s) in this backup?`,
                "Replace",
              ))
            )
              return;
            history = d.history;
            if (d.prefs && d.prefs.unit) prefs = d.prefs;
            await sset("wt-history", history);
            await sset("wt-prefs", prefs);
            render();
          } catch (e) {
            await uiAlert(
              "That file doesn't look like a tracker backup — import unchanged.",
            );
          } finally {
            input.value = "";
          }
        };
        rd.readAsText(f);
      };

      /* ================= ACTIONS ================= */
      window.upd = (exId, i, k, val) => {
        const day = PROGRAM.find((d) => d.ex.some((e) => e.id === exId));
        getActive(day).data[exId][i][k] = val.slice(0, 7);
        queueSave();
        // refresh finish button state without full re-render (keep keyboard up)
        const logged = Object.values(active[day.id].data)
          .flat()
          .some((s) => s.w !== "" || s.r !== "" || s.done);
        const fb = document.querySelector(".finish");
        if (fb) fb.disabled = !logged;
      };
      window.toggleDone = (exId, i) => {
        const day = PROGRAM.find((d) => d.ex.some((e) => e.id === exId));
        const s = getActive(day).data[exId][i];
        s.done = !s.done;
        queueSave();
        if (s.done) {
          const e = day.ex.find((x) => x.id === exId);
          const lbl = e.pair
            ? `${e.pair} done — go do ${partner(e.pair)}, then come back`
            : s.side
              ? `Rest, then ${e.name} (next side/set)`
              : `Rest, then ${e.name}`;
          startTimer(e.rest, lbl);
        }
        render();
      };
      window.setDate = (dayId, ymd) => {
        if (!ymd) return;
        const day = PROGRAM.find((d) => d.id === dayId);
        getActive(day).dateYMD = ymd;
        queueSave();
      };
      window.updNote = (exId, val) => {
        const day = PROGRAM.find((d) => d.ex.some((e) => e.id === exId));
        const sess = getActive(day);
        if (!sess.notes) sess.notes = {};
        sess.notes[exId] = val.slice(0, 200);
        queueSave();
      };
      window.finish = async (dayId) => {
        const sess = active[dayId];
        if (!sess) return;
        const ymd = sess.dateYMD || todayYMD();
        history.push({
          date: new Date(ymd + "T12:00:00").toISOString(),
          dayId,
          unit: prefs.unit,
          data: sess.data,
          notes: sess.notes || {},
        });
        history.sort((a, b) => (a.date < b.date ? -1 : 1));
        delete active[dayId];
        await sset("wt-history", history);
        await sset("wt-active", active);
        stopTimer();
        tab = "H";
        render();
      };
      window.resetDay = async (dayId) => {
        if (!(await uiConfirm("Clear all entries for this workout?", "Clear")))
          return;
        delete active[dayId];
        sset("wt-active", active);
        render();
      };
      window.wipe = async () => {
        if (
          !(await uiConfirm(
            "Delete ALL workout history? This can't be undone.",
            "Delete all",
          ))
        )
          return;
        history = [];
        sset("wt-history", history);
        render();
      };

      /* --- history edit / delete --- */
      window.editStart = (idx) => {
        editIdx = idx;
        render();
      };
      window.editCancel = () => {
        editIdx = null;
        render();
      };
      window.editSave = async () => {
        editIdx = null;
        await sset("wt-history", history);
        render();
      };
      window.editSet = (idx, exId, i, k, val) => {
        const s = history[idx];
        if (!s || !s.data[exId] || !s.data[exId][i]) return;
        s.data[exId][i][k] = val.slice(0, 7);
        queueHistSave();
      };
      window.editNote = (idx, exId, val) => {
        const s = history[idx];
        if (!s) return;
        if (!s.notes) s.notes = {};
        s.notes[exId] = val.slice(0, 200);
        queueHistSave();
      };
      window.editField = (idx, k, val) => {
        const s = history[idx];
        if (!s) return;
        if (k === "date" && val) {
          s.date = new Date(val + "T12:00:00").toISOString();
        }
        queueHistSave();
      };
      let histT = null;
      function queueHistSave() {
        clearTimeout(histT);
        histT = setTimeout(() => sset("wt-history", history), 500);
      }
      window.delSession = async (idx) => {
        const s = history[idx];
        if (!s) return;
        const day = PROGRAM.find((d) => d.id === s.dayId) || { name: s.dayId };
        const date = new Date(s.date).toLocaleDateString(undefined, {
          month: "short",
          day: "numeric",
        });
        if (
          !(await uiConfirm(
            `Delete this ${day.name} session from ${date}? This can't be undone.`,
            "Delete",
          ))
        )
          return;
        history.splice(idx, 1);
        if (editIdx === idx) editIdx = null;
        await sset("wt-history", history);
        render();
      };
      document.getElementById("unitTog").onclick = () => {
        prefs.unit = prefs.unit === "lb" ? "kg" : "lb";
        sset("wt-prefs", prefs);
        render();
      };

      /* ================= REST TIMER =================
   Timestamp-based: remaining time is computed from a target end time, so a brief
   screen lock no longer freezes the countdown — on unlock it shows true time left
   (or GO if the rest already elapsed). Triple beep at zero via WebAudio (audio is
   unlocked by the checkmark tap; iOS silent switch still mutes it, as it should). */
      let tInt = null,
        tEnd = 0,
        beeped = false,
        actx = null;
      function unlockAudio() {
        try {
          actx =
            actx || new (window.AudioContext || window.webkitAudioContext)();
          if (actx.state === "suspended") actx.resume();
        } catch (e) {}
      }
      function beep(n = 3) {
        if (!actx) return;
        try {
          for (let i = 0; i < n; i++) {
            const t = actx.currentTime + i * 0.35;
            const o = actx.createOscillator(),
              g = actx.createGain();
            o.type = "sine";
            o.frequency.value = 880;
            o.connect(g);
            g.connect(actx.destination);
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
            o.start(t);
            o.stop(t + 0.3);
          }
        } catch (e) {}
      }
      function startTimer(sec, label) {
        unlockAudio();
        clearInterval(tInt);
        beeped = false;
        tEnd = Date.now() + sec * 1000;
        const bar = document.getElementById("timerbar");
        bar.classList.add("show");
        bar.classList.remove("zero");
        document.getElementById("t-lbl").textContent = label;
        tick();
        tInt = setInterval(tick, 250);
      }
      function tick() {
        const left = Math.ceil((tEnd - Date.now()) / 1000);
        const bar = document.getElementById("timerbar");
        if (left <= 0) {
          clearInterval(tInt);
          tInt = null;
          bar.classList.add("zero");
          document.getElementById("t-num").textContent = "GO";
          document.getElementById("t-lbl").textContent =
            "Rest complete — next set.";
          if (!beeped) {
            beeped = true;
            beep(3);
          }
          return;
        }
        const m = Math.floor(left / 60),
          s = left % 60;
        document.getElementById("t-num").textContent =
          `${m}:${String(s).padStart(2, "0")}`;
      }
      function stopTimer() {
        clearInterval(tInt);
        tInt = null;
        document.getElementById("timerbar").classList.remove("show");
      }
      document.getElementById("t-x").onclick = stopTimer;
      document.getElementById("t-add").onclick = () => {
        unlockAudio();
        if (tEnd < Date.now()) tEnd = Date.now();
        tEnd += 30000;
        beeped = false;
        document.getElementById("timerbar").classList.remove("zero");
        if (!tInt) tInt = setInterval(tick, 250);
        tick();
      };

      init();
    </script>
  </body>
</html>
